<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard — LocalBiz</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/business.css">
</head>
<body>

  <!-- Navigation -->
  <nav id="main-nav"></nav>

  <div class="dashboard-layout">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-profile">
        <div class="sidebar-avatar" id="customer-avatar-initials">CS</div>
        <div class="sidebar-name" id="customer-profile-name">Customer Name</div>
        <div class="sidebar-role">Customer Account</div>
      </div>
      <nav class="sidebar-nav">
        <a class="sidebar-link active" data-tab="bookings">
          <span class="link-icon">📅</span>
          <span>My Bookings</span>
        </a>
        <a class="sidebar-link" data-tab="messages">
          <span class="link-icon">💬</span>
          <span>My Messages</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="dashboard-main">
      
      <!-- Bookings Tab Panel -->
      <div id="tab-bookings" class="dash-tab active">
        <div class="dashboard-title-row">
          <h2 class="dashboard-title">My Bookings</h2>
          <a href="businesses.html" class="btn btn-primary btn-sm">➕ Book New Service</a>
        </div>

        <!-- Inner Tabs for Bookings -->
        <div class="detail-tabs" style="margin-bottom: 24px;">
          <button class="tab-btn active" id="btn-bookings-upcoming" onclick="switchBookingsSubTab('upcoming')">📅 Upcoming Appointments</button>
          <button class="tab-btn" id="btn-bookings-past" onclick="switchBookingsSubTab('past')">⏳ Booking History</button>
        </div>

        <div id="bookings-list" class="service-grid">
          <!-- Dynamically populated -->
        </div>
      </div>

      <!-- Messages Tab Panel -->
      <div id="tab-messages" class="dash-tab">
        <div class="dashboard-title-row">
          <h2 class="dashboard-title">My Messages</h2>
        </div>

        <div class="inbox-layout">
          <!-- Inbox Sidebar -->
          <div class="inbox-sidebar">
            <h3 class="inbox-sidebar-title">Chats</h3>
            <div id="inbox-threads-list" class="inbox-list">
              <!-- Dynamically populated threads list -->
            </div>
          </div>

          <!-- Inbox Chat panel -->
          <div class="inbox-chat-panel" id="inbox-chat-area">
            <div class="inbox-chat-placeholder">
              <span class="inbox-chat-placeholder-icon">💬</span>
              <h3>Select a conversation</h3>
              <p>Choose an active merchant chat thread from the left menu to start messaging.</p>
            </div>
          </div>
        </div>
      </div>

    </main>

  </div>

  <!-- REVIEW MODAL -->
  <div id="review-modal" class="modal-overlay hidden">
    <div class="card modal-card">
      <span class="modal-close" onclick="closeReviewModal()">&times;</span>
      <h3 class="modal-title">⭐ Write a Review</h3>
      <form id="review-form">
        <input type="hidden" id="review-business-id" value="">
        <div class="form-group">
          <label class="form-label">Your Rating</label>
          <div class="star-selector" id="review-star-selector">
            <span data-value="1">★</span>
            <span data-value="2">★</span>
            <span data-value="3">★</span>
            <span data-value="4">★</span>
            <span data-value="5">★</span>
          </div>
          <input type="hidden" id="review-rating-input" required value="">
        </div>
        <div class="form-group">
          <label class="form-label" for="review-comment">Your Review</label>
          <textarea id="review-comment" class="form-control" placeholder="Share your experience working with this business..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px">Submit Review</button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/dashboard-customer.js"></script>
</body>
</html>
